{% extends 'base.html' %}
{% block title %}Post Produce — FarmLink{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div class="auth-card">
                <h2 class="mb-1"><i class="bi bi-plus-circle-fill text-success"></i> Post Produce</h2>
                <p class="subtitle">List your crop for buyers across Kenya to see.</p>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Crop Name</label>
                            <input type="text" name="name" class="form-control"
                                placeholder="e.g. Maize, Tomatoes" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Category</label>
                            <select name="category" class="form-select">
                                {% for val, label in form.fields.category.choices %}
                                    <option value="{{ val }}">{{ label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Quantity</label>
                            <input type="number" name="quantity" class="form-control"
                                placeholder="e.g. 100" step="0.01" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Unit</label>
                            <input type="text" name="unit" class="form-control"
                                placeholder="kg / crate / bag" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Price (KES)</label>
                            <input type="number" name="price" class="form-control"
                                placeholder="Per unit" step="0.01" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Location</label>
                            <input type="text" name="location" class="form-control"
                                placeholder="e.g. Nakuru, Nyeri" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description <span class="text-muted">(optional)</span></label>
                            <textarea name="description" class="form-control" rows="3"
                                placeholder="Extra details about your produce..."></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Produce Image <span class="text-muted">(optional)</span></label>
                            <input type="file" name="image" class="form-control" accept="image/*">
                        </div>
                    </div>

                    <button type="submit" class="btn-farmlink w-100 mt-4">
                        <i class="bi bi-upload"></i> Post Produce
                    </button>
                    <a href="{% url 'dashboard:farmer' %}" class="btn btn-outline-secondary w-100 mt-2">
                        Cancel
                    </a>
                </form>
            </div>

        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}My Profile — FarmLink{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="auth-card">

                <!-- Profile header -->
                <div class="text-center mb-4">
                    {% if user.profile_photo %}
                        <img src="{{ user.profile_photo.url }}"
                            class="rounded-circle mb-3"
                            style="width:90px;height:90px;object-fit:cover;border:3px solid #2E7D32;">
                    {% else %}
                        <div class="rounded-circle mx-auto mb-3 d-flex align-items-center justify-content-center"
                            style="width:90px;height:90px;background:#E8F5E9;border:3px solid #2E7D32;">
                            <i class="bi bi-person-fill text-success" style="font-size:2.5rem;"></i>
                        </div>
                    {% endif %}
                    <h5 class="fw-bold mb-0">{{ user.get_full_name|default:user.username }}</h5>
                    <span class="badge mt-1"
                        style="background:#E8F5E9;color:#2E7D32;font-size:0.8rem;">
                        {{ user.get_role_display }}
                    </span>
                </div>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <input type="text" name="first_name" class="form-control"
                                value="{{ user.first_name }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Last Name</label>
                            <input type="text" name="last_name" class="form-control"
                                value="{{ user.last_name }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control"
                                value="{{ user.email }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone</label>
                            <input type="text" name="phone" class="form-control"
                                value="{{ user.phone }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Location</label>
                            <input type="text" name="location" class="form-control"
                                value="{{ user.location }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Profile Photo</label>
                            <input type="file" name="profile_photo" class="form-control" accept="image/*">
                        </div>
                    </div>
                    <button type="submit" class="btn-farmlink w-100 mt-4">
                        <i class="bi bi-save-fill"></i> Save Changes
                    </button>
                    <a href="{% if user.is_farmer %}{% url 'dashboard:farmer' %}{% else %}{% url 'dashboard:buyer' %}{% endif %}"
                        class="btn btn-outline-secondary w-100 mt-2">
                        Back to Dashboard
                    </a>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}

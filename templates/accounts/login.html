{% extends 'base.html' %}
{% block title %}Login — FarmLink{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2><i class="bi bi-box-arrow-in-right"></i> Welcome Back</h2>
        <p class="subtitle">Login to your FarmLink account</p>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-farmlink w-100 mt-2">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
        </form>

        <p class="text-center mt-3 text-muted">
            Don't have an account?
            <a href="{% url 'accounts:register' %}" class="text-success fw-bold">Register</a>
        </p>
    </div>
</div>
{% endblock %}

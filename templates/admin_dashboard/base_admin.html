{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="dashboard-layout">
    <aside class="sidebar">
        <div class="sidebar-profile">
            <div class="sidebar-avatar-placeholder">
                <i class="bi bi-shield-fill-check"></i>
            </div>
            <div class="sidebar-name">{{ user.username }}</div>
            <div class="sidebar-role">⚙️ Admin</div>
        </div>
        <nav class="sidebar-nav">
            <a href="{% url 'admin_dashboard:home' %}"
                class="sidebar-link {% block nav_home %}{% endblock %}">
                <i class="bi bi-speedometer2"></i> Overview
            </a>
            <a href="{% url 'admin_dashboard:users' %}"
                class="sidebar-link {% block nav_users %}{% endblock %}">
                <i class="bi bi-people-fill"></i> Manage Users
            </a>
            <a href="{% url 'admin_dashboard:produce' %}"
                class="sidebar-link {% block nav_produce %}{% endblock %}">
                <i class="bi bi-box-seam-fill"></i> Manage Produce
            </a>
            <a href="{% url 'admin_dashboard:orders' %}"
                class="sidebar-link {% block nav_orders %}{% endblock %}">
                <i class="bi bi-receipt"></i> Manage Orders
            </a>
            <a href="{% url 'admin:index' %}" class="sidebar-link">
                <i class="bi bi-gear-fill"></i> Django Admin
            </a>
            <a href="{% url 'accounts:logout' %}" class="sidebar-link sidebar-logout">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </nav>
    </aside>
    <main class="dashboard-main">
        {% block admin_content %}{% endblock %}
    </main>
</div>
{% endblock %}
